<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026 - MODO PRUEBA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.container{max-width:880px;margin:0 auto;padding:16px}

#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
#login h1{font-size:2rem;margin-bottom:6px;color:#58a6ff}
#login .modo-prueba{background:#d2992220;border:1px solid #d29922;color:#d29922;padding:8px 16px;border-radius:8px;font-size:.85rem;margin-bottom:16px;text-align:center}
#login p{color:#8b949e;margin-bottom:20px}
#login input{width:280px;padding:11px 14px;margin:5px 0;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:1rem;outline:none}
#login input:focus{border-color:#58a6ff}
#login button{width:280px;padding:11px;margin-top:10px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer}
#login button:hover{background:#2ea043}
.error{color:#f85149;font-size:.9rem;margin-top:6px}

header{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #30363d;margin-bottom:14px;flex-wrap:wrap;gap:6px}
header .hl{display:flex;align-items:center;gap:8px}
header .hl h2{font-size:1.1rem;color:#58a6ff}
header .hl .test-badge{font-size:.65rem;background:#d2992220;border:1px solid #d29922;color:#d29922;padding:2px 8px;border-radius:4px}
header .hr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
header .hr span{color:#8b949e;font-size:.85rem}
header button{background:0;border:1px solid #30363d;color:#e6edf3;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:.78rem}
header button:hover{border-color:#58a6ff;color:#58a6ff}
header .btn-admin{color:#8b949e;padding:3px 8px;font-size:.72rem}
header .btn-admin.admin-activo{border-color:#d29922;color:#d29922}

.tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid #21262d}
.tab{padding:7px 16px;cursor:pointer;border-radius:6px 6px 0 0;font-size:.85rem;color:#8b949e;border-bottom:2px solid transparent}
.tab:hover{color:#e6edf3}
.tab.activo{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-content{display:none}
.tab-content.activo{display:block}

.grupo{margin-bottom:14px;background:#161b22;border-radius:10px;overflow:hidden;border:1px solid #21262d}
.grupo-header{padding:9px 12px;font-weight:600;font-size:.9rem;background:#1c2128;color:#58a6ff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.grupo-header .arrow{transition:transform .2s;font-size:.65rem}
.grupo-header .arrow.abierto{transform:rotate(180deg)}
.grupo-body{padding:2px 12px 8px}

.partido{display:grid;grid-template-columns:1fr auto 1fr;gap:4px;align-items:center;padding:6px 0;border-bottom:1px solid #21262d;font-size:.88rem}
.partido:last-child{border-bottom:none}
.eq{font-weight:500}
.eq.local{text-align:right}
.eq.visit{text-align:left}
.score-input{display:flex;gap:2px;align-items:center;position:relative}
.score-input input{width:34px;padding:2px 3px;text-align:center;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#e6edf3;font-size:.85rem;outline:none}
.score-input input:focus{border-color:#58a6ff}
.score-input .sep{color:#484f58;font-size:.75rem}
.score-display{font-weight:700;font-size:.9rem;color:#f0e6d0;min-width:40px;text-align:center}
.pts-badge{font-size:.7rem;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.pts-3{background:#23863630;color:#3fb950}
.pts-1{background:#d2992230;color:#d29922}
.pts-0{background:#f8514930;color:#f85149}

.admin-real{display:none;gap:2px;margin-left:4px}
.modo-admin .admin-real{display:inline-flex}
.admin-real input{width:26px;padding:2px;text-align:center;background:#1c2128;border:1px solid #d2992240;border-radius:3px;color:#d29922;font-size:.78rem;outline:none}
.admin-real input:focus{border-color:#d29922}
.admin-real .sep-r{color:#d2992240;font-size:.65rem}

.acciones{text-align:center;padding:10px 0 20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.acciones button{padding:10px 28px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer}
.acciones button:hover{background:#2ea043}
.acciones .btn-sec{background:#21262d;color:#e6edf3}
.acciones .btn-sec:hover{background:#30363d}
.acciones .btn-peligro{background:#da3633}
.acciones .btn-peligro:hover{background:#f85149}
.acciones button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}

.msg{padding:9px 12px;border-radius:6px;margin:10px 0;text-align:center;font-size:.85rem}
.msg.info{background:#0d419d20;border:1px solid #1f6feb40;color:#58a6ff}
.msg.warn{background:#3d2e0020;border:1px solid #d2992240;color:#d29922}
.msg.ok{background:#23863620;border:1px solid #23863640;color:#3fb950}
.msg.err{background:#da363320;border:1px solid #da363340;color:#f85149}

.ranking{background:#161b22;border-radius:10px;border:1px solid #21262d;overflow:hidden}
.ranking table{width:100%;border-collapse:collapse;font-size:.82rem}
.ranking th{padding:8px 10px;text-align:left;border-bottom:1px solid #21262d;color:#8b949e;font-weight:500;font-size:.78rem}
.ranking td{padding:7px 10px;border-bottom:1px solid #161b22}
.ranking tr:last-child td{border-bottom:none}
.ranking .pos{color:#8b949e;width:26px;font-weight:600}
.ranking .pos-1{color:#d29922}
.ranking .pos-2{color:#8b949e}
.ranking .pos-3{color:#a371f7}
.ranking .nombre{font-weight:500}
.ranking .pts-total{font-weight:700;color:#58a6ff;text-align:center}
.ranking .sm{color:#484f58;font-size:.72rem}

.config-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#00000080;display:flex;align-items:center;justify-content:center;z-index:100}
.config-modal .modal{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:400px;width:90%}
.config-modal h3{margin-bottom:12px;color:#58a6ff}
.config-modal label{display:block;margin:10px 0 4px;color:#8b949e;font-size:.85rem}
.config-modal input{width:100%;padding:8px 10px;background:#0d1117;border:1px solid #30363d;border-radius:5px;color:#e6edf3;font-size:.9rem;outline:none;margin-top:4px}
.config-modal input:focus{border-color:#58a6ff}
.config-modal .modal-acciones{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.config-modal button{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:.85rem}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .container{padding:8px}
  #login input,#login button{width:100%}
  .partido{font-size:.8rem}
  .score-input input{width:28px;font-size:.8rem}
  header .hl h2{font-size:.95rem}
}
</style>

function calcularPts(pred,real){
  if(pred===undefined||pred===null||real===undefined||real===null||real.gl===undefined||real.gv===undefined)return null;
  if(pred.gl===real.gl&&pred.gv===real.gv)return 3;
  const dPred=Math.sign(pred.gl-pred.gv);
  const dReal=Math.sign(real.gl-real.gv);
  if(dPred===dReal)return 1;
  return 0;
}

function nombreCoincide(nombreProde,nombreAPI){
  const alias=TEAM_ALIAS[nombreProde];
  if(!alias)return nombreProde.toLowerCase()===nombreAPI.toLowerCase();
  return alias.some(a=>a.toLowerCase()===nombreAPI.toLowerCase());
}

async function fetchFromTheSportsDB(apiKey){
  const url=`https://www.thesportsdb.com/api/v1/json/${apiKey}/eventsseason.php?id=4328&s=2026`;
  const res=await fetch(url);
  const data=await res.json();
  if(!data.events||data.events.length===0)return null;

  const resultados=[];
  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const evento=data.events.find(e=>{
      const local=e.strHomeTeam||"";
      const visit=e.strAwayTeam||"";
      return nombreCoincide(p.local,local)&&nombreCoincide(p.visit,visit);
    });
    if(evento&&evento.intHomeScore!==null&&evento.intAwayScore!==null){
      const gl=parseInt(evento.intHomeScore);
      const gv=parseInt(evento.intAwayScore);
      if(!isNaN(gl)&&!isNaN(gv)){
        resultados[i]={gl,gv};
      }else{
        resultados[i]=null;
      }
    }else{
      resultados[i]=null;
    }
  }
  return resultados;
}

async function fetchFromWikipedia(){
  const url="https://en.wikipedia.org/w/api.php?action=parse&page=2026_FIFA_World_Cup&prop=text&section=8&format=json&origin=*";
  const res=await fetch(url);
  const data=await res.json();
  if(!data.parse||!data.parse.text||!data.parse.text["*"])return null;

  const html=data.parse.text["*"];
  const resultados=[];

  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const localNames=TEAM_ALIAS[p.local]||[p.local];
    const visitNames=TEAM_ALIAS[p.visit]||[p.visit];

    const score=findScoreInHTML(html,localNames,visitNames);
    if(score){
      resultados[i]=score;
    }else{
      resultados[i]=null;
    }
  }

  return resultados;
}

function findScoreInHTML(html,localNames,visitNames){
  for(const loc of localNames){
    for(const vis of visitNames){
      const regex=new RegExp(
        loc.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+
        '\\s*(\\d+)\\s*[-–]\\s*(\\d+)\\s*'+
        vis.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'
      );
      const match=html.match(regex);
      if(match){
        return {gl:parseInt(match[1]),gv:parseInt(match[2])};
      }
    }
  }
  return null;
}

async function fetchFromCustomAPI(apiUrl){
  const res=await fetch(apiUrl);
  const data=await res.json();

  let partidos=data.matches||data.events||data.data||data.response||data;

  if(!Array.isArray(partidos)){
    if(typeof partidos==="object"){
      partidos=Object.values(partidos);
    }
  }

  if(!Array.isArray(partidos))return null;

  const resultados=[];
  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const match=partidos.find(m=>{
      const ml=(m.local||m.home||m.homeTeam||m.strHomeTeam||"").trim();
      const mv=(m.visit||m.away||m.awayTeam||m.strAwayTeam||"").trim();
      return nombreCoincide(p.local,ml)&&nombreCoincide(p.visit,mv);
    });

    if(match){
      const gl=parseInt(match.gl||match.goles_local||match.homeScore||match.intHomeScore||match.goalsHome||-1);
      const gv=parseInt(match.gv||match.goles_visit||match.awayScore||match.intAwayScore||match.goalsAway||-1);
      if(!isNaN(gl)&&!isNaN(gv)&&gl>=0&&gv>=0){
        resultados[i]={gl,gv};
      }else{
        resultados[i]=null;
      }
    }else{
      resultados[i]=null;
    }
  }
  return resultados;
}

  let html=`<div style="margin-top:14px">

        <th style="text-align:left;padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e">Local</th>
        <th style="padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e"></th>
        <th style="text-align:left;padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e">Visitante</th>

      </tr>`;
  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const r=resultados[i];
    const real=reales?reales[i]:null;
    const pts=calcularPts(r,real);
    if(i===0||PARTIDOS[i-1].grupo!==p.grupo){
      html+=`<tr><td colspan="${hayReales?7:5}" style="padding:6px 5px 2px;color:#58a6ff;font-weight:600;font-size:.8rem">Grupo ${p.grupo}</td></tr>`;
    }
    html+=`<tr>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;color:#484f58">${i+1}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22">${p.local}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;color:#484f58">vs</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22">${p.visit}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center;font-weight:600">${r?r.gl:'?'}-${r?r.gv:'?'}</td>
      ${hayReales?`<td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center;color:#d29922;font-weight:600">${real!==null&&real!==undefined?real.gl+' - '+real.gv:'-'}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center">${pts!==null?`<span class="pts-badge pts-${pts}">${pts}</span>`:'-'}</td>`:''}
    </tr>`;
  }
  if(hayReales){

      return s+(pts||0);
    },0);
    html+=`<tr><td colspan="${hayReales?6:4}" style="padding:6px 5px;text-align:right;font-weight:600;font-size:.85rem">TOTAL:</td>
      <td style="padding:6px 5px;text-align:center;color:#58a6ff;font-weight:700;font-size:1rem">${total} pts</td></tr>`;

  html+=`</table></div>`;

function renderRanking(bd,reales,hayReales){
  if(!hayReales){
    return `<div class="msg info">Los resultados reales aún no fueron cargados. Ingresá como 🎯 Admin para cargarlos.</div>`;
  }

  const filas=Object.entries(bd.usuarios)
    .filter(([k])=>k!=="admin_admin")
    .map(([,usr])=>{
      if(!usr.resultados||usr.resultados.length===0)return null;
      let pts=0,p3=0,p1=0;
      usr.resultados.forEach((r,i)=>{
        const p=calcularPts(r,reales[i]);
        if(p===3)p3++;
        else if(p===1)p1++;
        if(p)pts+=p;
      });
      return {nombre:usr.nombre,apellido:usr.apellido,pts,p3,p1,total:usr.resultados.length};
    })
    .filter(f=>f!==null);

  filas.sort((a,b)=>b.pts-a.pts);

  if(filas.length===0){
    return `<div class="msg warn">Todavía no hay participantes con predicciones.</div>`;
  }

  let html=`<div class="ranking"><table>
    <tr><th>#</th><th>Nombre</th><th style="text-align:center">Pts</th><th style="text-align:center">3</th><th style="text-align:center">1</th><th style="text-align:center">0</th><th style="text-align:center">Efectividad</th></tr>`;
  for(let i=0;i<filas.length;i++){
    const f=filas[i];
    const jugados=f.total;
    const p0=jugados-f.p3-f.p1;
    const maxPts=jugados*3;
    const efect=maxPts>0?((f.pts/maxPts)*100).toFixed(1):"0.0";
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html+=`<tr>
      <td class="pos pos-${i<3?i+1:''}">${medal||i+1}</td>
      <td class="nombre">${f.nombre} ${f.apellido}</td>
      <td class="pts-total">${f.pts}</td>
      <td style="text-align:center;color:#3fb950;font-weight:600">${f.p3}</td>
      <td style="text-align:center;color:#d29922;font-weight:600">${f.p1}</td>
      <td style="text-align:center;color:#484f58">${p0}</td>
      <td style="text-align:center;color:#8b949e">${efect}%</td>
    </tr>`;
  }
  html+=`</table></div>`;
  return html;
}

      </label>
      <label>API Key (opcional)
        <input type="text" id="cfgApiKey" value="${cfg.apiKey}" placeholder="Ej: 3 (TheSportsDB)">
      </label>
      <label>API URL personalizada (opcional)
        <input type="text" id="cfgApiUrl" value="${cfg.apiUrl}" placeholder="https://ejemplo.com/api/matches">
      </label>
      <div class="modal-acciones">
        <button onclick="cerrarModalConfig()" style="background:#21262d;color:#e6edf3">Cancelar</button>
        <button onclick="guardarConfigModal()" style="background:#238636;color:#fff">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function cerrarModalConfig(){
  const el=document.getElementById("modalConfig");
  if(el)el.remove();
}

function guardarConfigModal(){
  const pass=document.getElementById("cfgPass").value.trim();
  const apiKey=document.getElementById("cfgApiKey").value.trim();
  const apiUrl=document.getElementById("cfgApiUrl").value.trim();
  if(!pass){alert("La contraseña no puede estar vacía.");return}
  guardarConfig({adminPass:pass,apiKey,apiUrl});
  cerrarModalConfig();
  renderApp();
  alert("Configuración guardada.");
}

function autoLogin(){
  const saved=sessionStorage.getItem(SESSION_KEY);
  if(saved){
    try{
      window.USUARIO=JSON.parse(saved);
      window.ADMIN_MODE=false;
      return true;
    }catch(e){}
  }
  return false;
}

function init(){
  if(autoLogin()){
    renderApp();
  }else{
    document.getElementById("app").innerHTML=loginHTML();
  }
}

init();
</script>
</body>
</html>
