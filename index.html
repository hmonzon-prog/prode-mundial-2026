<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (Compat v10) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <!-- jsPDF Library -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.55);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --secondary: #6366f1;
      --secondary-hover: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.12);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.12);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.12);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: radial-gradient(circle at top, #0f172a, #030712);
      color: var(--text-main);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
    }
    
    .container {
      width: 100%;
      max-width: 580px;
      padding: 16px;
      margin: 0 auto;
    }
    
    /* === LOGIN SCREEN === */
    #login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 90vh;
      width: 100%;
    }
    
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
    }
    
    .login-card .trofeo-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }
    
    .login-card .trofeo-wrap .trofeo {
      font-size: 3.5rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #f8fafc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .login-card h1 span {
      color: #6366f1;
    }
    
    .login-card .sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 18px;
    }
    
    .login-card .year-line {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 4px 14px;
      border-radius: 12px;
      font-size: 0.72rem;
      color: #a5b4fc;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    
    .login-card .grupos-vis {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .login-card .grupos-vis span {
      font-size: 0.65rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .login-card .input-group {
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    
    .login-card .input-group:focus-within {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
    
    .login-card .input-group .ic {
      font-size: 0.95rem;
      margin-right: 10px;
    }
    
    .login-card .input-group input {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
    
    .login-card button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-hover));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .login-card button:hover {
      transform: translateY(-1.5px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    
    .login-card button:active {
      transform: translateY(0);
    }
    
    .login-card .admin-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 1px dashed var(--text-muted);
      padding-bottom: 1px;
    }
    
    .login-card .admin-link:hover {
      color: var(--text-main);
      border-bottom-color: var(--text-main);
    }
    
    .login-card .error {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 20px;
    }
    
    .login-card .footer {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: center;
      gap: 16px;
    }
    
    /* === APP HEADER === */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    header .hl {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    header .hl h2 {
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f8fafc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    header .hr {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    header .hr span {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    header button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-main);
      padding: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    header button:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
    }
    
    header .btn-admin {
      color: var(--text-muted);
      padding: 3px 10px;
      font-size: 0.72rem;
    }
    
    header .btn-admin.admin-activo {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
    }
    
    /* === TABS === */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 1px;
    }
    
    .tab {
      padding: 8px 18px;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
    }
    
    .tab:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }
    
    .tab.activo {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.activo {
      display: block;
    }
    
    /* === FILTER PILLS === */
    .filtros {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 4px 0;
    }
    .filtro-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      transition: all .15s;
      user-select: none;
      white-space: nowrap;
      background: transparent;
    }
    .filtro-pill:hover {
      border-color: var(--primary);
      color: var(--text-main);
    }
    .filtro-pill.activo {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    
    /* === GROUPS & MATCHES === */
    .grupo {
      margin-bottom: 16px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }
    
    .grupo-header {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      background: rgba(15, 23, 42, 0.6);
      color: var(--primary);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .grupo-header .arrow {
      transition: transform 0.2s;
      font-size: 0.7rem;
    }
    
    .grupo-header .arrow.abierto {
      transform: rotate(180deg);
    }
    
    .grupo-body {
      padding: 4px 16px 12px;
    }
    
    .partido {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 6px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.9rem;
      position: relative;
    }
    
    .partido:last-child {
      border-bottom: none;
    }
    
    .partido.cerrado {
      opacity: 0.65;
    }
    
    .cerrado-badge {
      position: absolute;
      top: 2px;
      right: 0;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.05);
      padding: 1px 5px;
      border-radius: 4px;
    }
    
    .eq {
      font-weight: 500;
    }
    
    .eq.local {
      text-align: right;
    }
    
    .eq.visit {
      text-align: left;
    }
    
    .fecha {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      min-width: 30px;
    }
    
    .score-input {
      display: flex;
      gap: 3px;
      align-items: center;
      position: relative;
    }
    
    .score-input input {
      width: 36px;
      padding: 3px;
      text-align: center;
      background: rgba(15, 23, 42, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 0.88rem;
      font-weight: 600;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .score-input input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    
    .score-input .sep {
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    
    .score-display {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-main);
      min-width: 44px;
      text-align: center;
    }
    
    .pts-badge {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
      margin-left: 6px;
    }
    
    .pts-3 {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .pts-1 {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    
    .pts-0 {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }    /* === BUTTONS & MESSAGES === */
    .acciones {
      text-align: center;
      padding: 12px 0 24px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .acciones button {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      transition: all 0.2s;
    }
    
    .acciones button:hover {
      background: linear-gradient(135deg, #10b981, #047857);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }
    
    .acciones .btn-sec {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    
    .acciones .btn-sec:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    .btn-save-partido {
      background: none;
      border: none;
      cursor: pointer;
      font-size: .8rem;
      padding: 0 4px;
      opacity: .5;
      transition: opacity .15s;
      vertical-align: middle;
      line-height: 1;
    }
    .btn-save-partido:hover { opacity: 1; }

    .btn-pdf-ronda {
      background: none; border: none; cursor: pointer;
      font-size: .72rem; padding: 0 4px; opacity: .5;
      transition: opacity .15s; vertical-align: middle; line-height: 1;
      margin-left: auto; margin-right: 4px;
    }
    .btn-pdf-ronda:hover { opacity: 1; }
    
    .acciones button:disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      margin: 12px 0;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .msg.info {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: #93c5fd;
    }
    
    .msg.warn {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #fde047;
    }
    
    .msg.ok {
      background: var(--success-bg);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #6ee7b7;
    }
    
    /* === RANKING & PARTICIPANTES === */
    .ranking {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }
    
    .ranking table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    
    .ranking th {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .ranking td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .ranking tr:last-child td {
      border-bottom: none;
    }
    
    .ranking .pos {
      color: var(--text-muted);
      width: 32px;
      font-weight: 700;
    }
    
    .ranking .pos.pos-1 { color: #fbbf24; }
    .ranking .pos.pos-2 { color: #cbd5e1; }
    .ranking .pos.pos-3 { color: #b45309; }
    
    .ranking .nombre {
      font-weight: 600;
    }
    
    .ranking .pts-total {
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      font-size: 0.95rem;
    }
    
    .participantes {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }
    
    .participantes h4 {
      margin-bottom: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-main);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 6px;
    }
    
    .participantes-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
    }
    
    .participantes-grid .part {
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .participantes-grid .part.ok {
      color: var(--success);
      font-weight: 500;
    }
    
    /* === LOADER === */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    
    .loading .spinner {
      width: 36px;
      height: 36px;
      border-width: 3.5px;
      display: block;
      margin: 18px auto;
    }
    
    /* === OTHER ELEMENTS === */
    #drop-zone {
      border: 2px dashed rgba(255,255,255,0.15);
      background: rgba(255, 255, 255, 0.01);
      transition: all 0.3s;
    }
    
    #drop-zone:hover {
      border-color: var(--primary) !important;
      background: rgba(59, 130, 246, 0.05) !important;
      color: var(--text-main) !important;
    }
    
    .extra-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }
    
    .extra-box .eb-item {
      flex: 1;
      min-width: 170px;
    }
    
    .extra-box label {
      display: block;
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .extra-box select, .extra-box input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    .extra-box select:focus, .extra-box input:focus {
      border-color: var(--accent);
    }
    
    .extra-box .pts-extra {
      font-size: 0.68rem;
      color: var(--accent);
      margin-left: 4px;
      font-weight: bold;
    }
    
    /* === HELP MODAL === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    
    #modal-contenido {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    
    #modal-contenido h3 {

    function normalizeKey(s){
      return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9_]/g,"");
    }

    function calcularPts(pred, real, fecha){
      if(!pred||!real||real.gl===undefined||real.gv===undefined)return null;
      if(fecha&&bd.scoring_start){
        const[d1,m1]=fecha.split('/').map(Number);
        const[d2,m2]=bd.scoring_start.split('/').map(Number);
        if(m1<m2||(m1===m2&&d1<d2))return null;
      }
      if(pred.gl===real.gl&&pred.gv===real.gv)return 3;
      const dPred=Math.sign(pred.gl-pred.gv);
      const dReal=Math.sign(real.gl-real.gv);
      if(dPred===dReal)return 1;
      return 0;
    }

    function toggleGrupo(g){
      const key="grupo_"+g;
      sessionStorage.setItem(key,sessionStorage.getItem(key)==="closed"?"open":"closed");
      renderApp();
    }
    function toggleRonda(r){
      const key="elim_ronda_"+r;
      sessionStorage.setItem(key,sessionStorage.getItem(key)==="closed"?"open":"closed");
      renderApp();
    }

    function autofocusNext(el){
      if(el.value.length>=1){
        const inputs=el.closest('.score-input').querySelectorAll('input[type="number"]');
        for(const inp of inputs){
          if(inp!==el){inp.focus();break}
        }
      }
    }

    function generarResumen(resultados,reales,hayReales){
      if(!resultados)return "";
      let html=`<div style="margin-top:14px">
        <h3 style="margin:12px 0 6px;font-size:.9rem;color:var(--text-muted)">📋 Resumen</h3>
        <table style="width:100%;border-collapse:collapse;font-size:.78rem">
          <tr>
            <th style="text-align:left;padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted)">#</th>
            <th style="text-align:left;padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted)">Local</th>
            <th style="padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted)"></th>
            <th style="text-align:left;padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted)">Visitante</th>
            <th style="padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted);text-align:center">Pred</th>
            ${hayReales?'<th style="padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted);text-align:center">Real</th>':''}${hayReales&&bd.scoring_active?'<th style="padding:3px 5px;border-bottom:1px solid rgba(255,255,255,0.1);color:var(--text-muted);text-align:center">Pts</th>':''}
          </tr>`;
      let lastGrp=null,gi=0;
      for(let i=0;i<PARTIDOS.length;i++){
        const p=PARTIDOS[i];
        const r=resultados[i];
        const real=reales?reales[i]:null;
        const pts=calcularPts(r,real,p.fecha);
        if(p.grupo!==lastGrp){lastGrp=p.grupo;gi=0;html+=`<tr><td colspan="${hayReales?(bd.scoring_active?7:6):5}" style="padding:5px 5px 2px;color:var(--primary);font-weight:600;font-size:.8rem">Grupo ${p.grupo}</td></tr>`}
        if(gi%2===0){
          const numF=Math.floor(gi/2)+1;
          html+=`<tr><td colspan="${hayReales?(bd.scoring_active?7:6):5}" style="padding:4px 5px 1px;color:var(--text-muted);font-size:.68rem;font-weight:500;letter-spacing:.5px">Fecha ${numF}</td></tr>`;
        }
        html+=`<tr>
          <td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05);color:var(--text-muted)">${i+1}</td>
          <td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05)">${p.local}</td>
          <td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05);color:var(--text-muted)">vs</td>
          <td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05)">${p.visit}</td>
          <td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05);text-align:center;font-weight:600">${r?r.gl:'?'}-${r?r.gv:'?'}</td>
          ${hayReales?`<td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05);text-align:center;color:var(--accent);font-weight:600">${real!==null&&real!==undefined?real.gl+' - '+real.gv:'-'}</td>
          ${bd.scoring_active?`<td style="padding:2px 5px;border-bottom:1px solid rgba(255,255,255,0.05);text-align:center">${pts!==null?`<span class="pts-badge pts-${pts}">${pts}</span>`:'-'}</td>`:''}`:''}
        </tr>`;
        gi++;
      }
      if(hayReales&&bd.scoring_active){
        const total=resultados.slice(0,PARTIDOS.length).reduce((s,r,i)=>{const p=calcularPts(r,reales[i],PARTIDOS[i].fecha);return s+(p||0);},0);
        html+=`<tr><td colspan="6" style="padding:6px 5px;text-align:right;font-weight:600;font-size:.85rem">TOTAL GRUPOS:</td>
          <td style="padding:6px 5px;text-align:center;color:var(--primary);font-weight:700;font-size:1rem">${total} pts</td></tr>`;
      }
      html+=`</table></div>`;
      return html;
    }

    function renderRanking(reales,hayReales,esAdmin){
      const allUsers=Object.entries(bd.usuarios).filter(([k])=>k!=="admin_admin");
      let html=`<div class="participantes">
        <h4>👥 Participantes (${allUsers.length})</h4>
        <div class="participantes-grid">${allUsers.map(([k,u])=>{
          const ok=u.resultados&&u.resultados.length>0;
          return `<span class="part${ok?' ok':''}">${ok?'✔':'✖'} ${esAdmin?`<span style="cursor:pointer;color:var(--primary);text-decoration:underline" onclick="editarUsuario('${k}')">${u.nombre} ${u.apellido}</span>`:`${u.nombre} ${u.apellido}`}${esAdmin?` <span style="cursor:pointer;color:var(--danger);font-size:.7rem;text-decoration:underline;margin-left:4px" onclick="eliminarUsuario('${k}')">Eliminar</span>`:''}${esAdmin&&ok?` <span style="cursor:pointer;color:var(--success);font-size:.7rem;text-decoration:underline;margin-left:4px" onclick="descargarPDF('${k}')">PDF</span>`:''}</span>`;
        }).join("")}</div>
      </div>`;

      if(!hayReales){
        return html+`<div class="msg info" style="margin-top:12px">Los resultados reales aún no fueron cargados. Ingresá como Admin para cargarlos.</div>`;
      }

      const entries=allUsers;
      const filas=entries.map(([k,usr])=>{
        if(!usr.resultados||usr.resultados.length===0)return null;
        let pts=0,p3=0,p1=0;
        for(let i=0;i<PARTIDOS.length;i++){
          const p=calcularPts(usr.resultados[i],reales[i],PARTIDOS[i].fecha);
          if(p===3)p3++;else if(p===1)p1++;
          if(p)pts+=p;
        }
        // Eliminatoria points
        const elimR = bd.reales_elim || [];
        const elimU = usr.elim_resultados || [];
        if(elimU.length > 0){
          for(let i=0;i<PARTIDOS_ELIM.length;i++){
            const p=calcularPts(elimU[i],elimR[i],null);
            if(p===3)p3++;else if(p===1)p1++;
            if(p)pts+=p;
          }
        }
        let bonus=0;
        if(bd.campeon_real&&usr.campeon===bd.campeon_real)bonus+=10;
        if(bd.goleador_real&&usr.goleador&&usr.goleador.toLowerCase()===bd.goleador_real.toLowerCase())bonus+=5;
        pts+=bonus;
        return {key:k,nombre:usr.nombre,apellido:usr.apellido,pts,p3,p1,bonus,total:usr.resultados.length};
      }).filter(f=>f!==null);

      filas.sort((a,b)=>b.pts-a.pts || b.p3-a.p3 || b.p1-a.p1);

      if(filas.length===0) return html+`<div class="msg warn">Nadie cargó su predicción todavía.</div>`;

      const hayBonus=bd.campeon_real||bd.goleador_real;
      html+=`<div class="ranking"><table>
        <tr><th>#</th><th>Nombre</th><th style="text-align:center">Pts</th><th style="text-align:center">3</th><th style="text-align:center">1</th><th style="text-align:center">0</th><th style="text-align:center">Efect.</th>${hayBonus?'<th style="text-align:center">Bonus</th>':''}${esAdmin?'<th style="text-align:center">Acción</th>':''}</tr>`;
      for(let i=0;i<filas.length;i++){
        const f=filas[i];
        const p0=f.total-f.p3-f.p1;
        const maxPts=f.total*3;
        const efect=maxPts>0?((f.pts/maxPts)*100).toFixed(1):"0.0";
        const dp=bd.scoring_active?f.pts:0;
        const d3=bd.scoring_active?f.p3:0;
        const d1=bd.scoring_active?f.p1:0;
        const d0=bd.scoring_active?p0:f.total;
        const de=bd.scoring_active?efect:"0.0";
        const db=bd.scoring_active?(f.bonus>0?'+'+f.bonus:'-'):'-';
        html+=`<tr>
          <td class="pos ${i<3?`pos-${i+1}`:''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
          <td class="nombre">${esAdmin?`<span style="cursor:pointer;color:var(--primary);text-decoration:underline" onclick="editarUsuario('${f.key}')">${f.nombre} ${f.apellido}</span>`:`${f.nombre} ${f.apellido}`}</td>
          <td class="pts-total">${dp}</td>
          <td style="text-align:center;color:var(--success);font-weight:600">${d3}</td>
          <td style="text-align:center;color:var(--accent);font-weight:600">${d1}</td>
          <td style="text-align:center;color:var(--text-muted)">${d0}</td>
          <td style="text-align:center;color:var(--text-muted)">${de}%</td>
          ${hayBonus?`<td style="text-align:center;color:var(--accent);font-weight:600;font-size:.8rem">${db}</td>`:''}
          ${esAdmin?`<td style="text-align:center"><span style="cursor:pointer;color:var(--accent);font-size:.75rem;text-decoration:underline;margin-right:6px" onclick="editarUsuario('${f.key}')">Editar</span><span style="cursor:pointer;color:var(--primary);font-size:.75rem;text-decoration:underline" onclick="descargarPDF('${f.key}')">📄 PDF</span></td>`:''}
        </tr>`;
      }
      html+=`</table></div>`;
      html+=`<div class="acciones" style="margin-top:6px"><button class="btn-sec" onclick="compartirRanking()">📊 Compartir ranking</button></div>`;
      return html;
    }

    function editarUsuario(key){
      EDITANDO_KEY=key;
      sessionStorage.setItem("prode_tab","prode");
      renderApp();
    }

    async function eliminarUsuario(key){
      const u=bd.usuarios[key];
      if(!u)return;
      if(!confirm(`¿Eliminar a ${u.nombre} ${u.apellido}?`))return;
      delete bd.usuarios[key];
      try{
        await DB.collection("usuarios").doc(key).delete();
      }catch(e){
        alert("Error: "+e.message);
      }
      renderApp();
    }

    function cancelarEdicion(){
      EDITANDO_KEY=null;
      renderApp();
    }

    async function guardarEdicionUsuario(){
      const u=bd.usuarios[EDITANDO_KEY];
      const existing=u.resultados||[];
      const inputs=document.querySelectorAll(".inp-gl");
      const resultados=[];

      for(const inp of inputs){
        const idx=parseInt(inp.dataset.idx);
        const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
        const gl=inp.value.trim();
        const gvVal=gv.value.trim();
        if(gl===""||gvVal===""){
          resultados[idx]=existing[idx]||null;
        }else if(isNaN(gl)||isNaN(gvVal)||parseInt(gl)<0||parseInt(gvVal)<0){
          alert(`Resultado #${idx+1} inválido.`);
          return;
        }else{
          resultados[idx]={gl:parseInt(gl),gv:parseInt(gvVal)};
        }
      }

      for(let i=0;i<resultados.length;i++)if(resultados[i]===undefined)resultados[i]=null;

      // Eliminatoria
      const elimEx = u.elim_resultados || [];
      const elimInputs = document.querySelectorAll(".inp-gl-elim");
      const elimResultados = [];
      if(elimInputs.length > 0){
        for(const inp of elimInputs){
          const idx=parseInt(inp.dataset.idx);
          const gv=document.querySelector(`.inp-gv-elim[data-idx="${idx}"]`);
          const gl=inp.value.trim();
          const gvVal=gv.value.trim();
          if(gl===""||gvVal===""){
            elimResultados[idx]=elimEx[idx]||null;
          }else if(isNaN(gl)||isNaN(gvVal)||parseInt(gl)<0||parseInt(gvVal)<0){
            alert(`Eliminatoria #${idx+1} inválido.`);
            return;
          }else{
            elimResultados[idx]={gl:parseInt(gl),gv:parseInt(gvVal)};
          }
        }
        for(let i=0;i<elimResultados.length;i++)if(elimResultados[i]===undefined)elimResultados[i]=null;
      }

      const campeon=document.getElementById("inp-campeon");
      const goleador=document.getElementById("inp-goleador");
      const campeonVal=campeon?campeon.value:(u.campeon||"");
      const goleadorVal=goleador?goleador.value.trim():(u.goleador||"");
      if(!confirm(`Guardar predicción para ${u.nombre} ${u.apellido}?`))return;
      const updated = {nombre:u.nombre,apellido:u.apellido,fecha:new Date().toLocaleString("es-AR"),resultados,campeon:campeonVal,goleador:goleadorVal};

    let pdfjsLoaded = false;

    async function subirPDF(file){
      const status=document.getElementById("pdf-status");
      if(!file){status.innerHTML="";return}
      if(file.type!=="application/pdf"){status.innerHTML=`<div class="msg warn">El archivo debe ser PDF.</div>`;return}
      if(!pdfjsLoaded){
        status.innerHTML=`<div class="spinner"></div> Cargando lector PDF...`;
        try{
          await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s)});
          window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          pdfjsLoaded=true;
        }catch(e){status.innerHTML=`<div class="msg warn">Error al cargar el lector PDF.</div>`;return}
      }
      status.innerHTML=`<div class="spinner"></div> Leyendo PDF...`;
      try{
        const buf=await file.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:buf}).promise;
        // Collect ALL text items with their X,Y positions across all pages
        const allItems=[];
        let pageYOffset=0;
        for(let i=1;i<=pdf.numPages;i++){
          const pg=await pdf.getPage(i);
          const c=await pg.getTextContent();
          const pageH=pg.view[3]||842;
          for(const it of c.items){
            if(!it.str||!it.str.trim())continue;
            allItems.push({
              str:it.str,
              x:Math.round(it.transform[4]),
              y:Math.round(pageYOffset+pageH-it.transform[5])
            });
          }
          pageYOffset+=pageH;
        }
        // Sort items top-to-bottom, left-to-right
        allItems.sort((a,b)=>a.y-b.y||a.x-b.x);
        // Group items into logical rows (same Y within tolerance of 3 units)
        const rows=[];
        let curRow=[];
        let curY=null;
        for(const it of allItems){
          if(curY!==null&&Math.abs(it.y-curY)>3){
            if(curRow.length)rows.push({y:curY,items:[...curRow]});
            curRow=[];
          }
          curRow.push(it);
          curY=it.y;
        }
        if(curRow.length)rows.push({y:curY,items:[...curRow]});
        // Detect column boundaries from the data
        // jsPDF uses mm units * 2.835 for PDF points
        // col0 starts at x~40(14mm), col1 at x~218(77mm), col2 at x~397(140mm)
        const COL_SPLITS=[130,310];
        const getCol=x=>x<COL_SPLITS[0]?0:x<COL_SPLITS[1]?1:2;
        // Build per-column text lines
        const colLines=[[],[],[]];
        for(const row of rows){
          const byCols=[[],[],[]];
          for(const it of row.items){
            byCols[getCol(it.x)].push(it);
          }
          for(let c=0;c<3;c++){
            if(byCols[c].length){
              byCols[c].sort((a,b)=>a.x-b.x);
              const lineText=byCols[c].map(it=>it.str).join(" ").replace(/\s+/g," ").trim();
              if(lineText)colLines[c].push(lineText);
            }
          }
        }
        // Build full text for header extraction
        let fullText=rows.map(r=>{
          r.items.sort((a,b)=>a.x-b.x);
          return r.items.map(it=>it.str).join(" ").replace(/\s+/g," ").trim();
        }).join("\n");
        // Combine column lines for match parsing
        const matchLines=[...colLines[0],...colLines[1],...colLines[2]];
        console.log("PDF extraction: "+allItems.length+" items, "+rows.length+" rows, columns: "+colLines[0].length+"/"+colLines[1].length+"/"+colLines[2].length+" lines");
        const datos=parsearPDFText(fullText,matchLines);
        if(!datos){status.innerHTML=`<div class="msg warn">No se pudieron extraer las predicciones. ¿Es un PDF generado desde el Prode?</div>`;return}
        mostrarConfirmacionRestauracion(datos);
        status.innerHTML="";
      }catch(e){status.innerHTML=`<div class="msg warn">Error al leer el PDF: ${e.message}</div>`}
    }

    function parsearPDFText(fullText,matchLines){
      // fullText = all rows joined (for header/campeon/goleador extraction)
      // matchLines = per-column lines (for accurate match extraction)
      const headerLines=fullText.split("\n").map(l=>l.replace(/\s+/g," ").trim()).filter(l=>l);
      let nombre="",apellido="",campeon="",goleador="";
      for(const line of headerLines){
        let cleaned = line.replace(/Prode Mundial 2026/i, "").trim();
        let m=cleaned.match(/^(.+?)\s*[\-\u2013\u2014—,]\s*\d/);
        if(m&&!nombre&&!m[1].toLowerCase().includes("vs")){
          const p=m[1].trim().split(/\s+/);
          if(p.length>=1){nombre=p[0];apellido=p.slice(1).join(" ");continue}
        }
        m=line.match(/Campe[o\u00f3]n:\s*(.+?)\s+Goleador:\s*(.+)/i);
        if(m){campeon=m[1].trim();goleador=m[2].trim();continue}
      }
      if(!nombre)return null;
      const res=new Array(72).fill(null);
      const glookup={};
      PARTIDOS.forEach((p,i)=>{glookup[p.local+"||"+p.visit]=i});
      const allTeams=[...new Set(PARTIDOS.flatMap(p=>[p.local,p.visit]))];
      const simpl = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");
      const allTeamsSimpl = allTeams.map(t => ({ orig: t, s: simpl(t) }));
      const findTeam = name => {
        const sn = simpl(name);
        if(!sn)return null;
        
        // Manual aliases
        if(sn === "republicacheca") return "Rep. Checa";
        if(sn === "estadosunidos") return "EE. UU.";
        if(sn === "bosniayherzegovina") return "Bosnia";
        
        // Exact match first
        let match = allTeamsSimpl.find(t => t.s === sn);
        if(match)return match.orig;
        // Substring match (both ways)
        match = allTeamsSimpl.find(t => (sn.length > 3 && t.s.includes(sn)) || (t.s.length > 3 && sn.includes(t.s)));
        return match ? match.orig : null;
      };
      // Parse match results from column-separated lines
      const vsRegex=/(.+?)\s+vs\s+(.+?)\s+(\d+)\s*[\-\u2013]\s*(\d+)/gi;
      let foundCount=0;
      for(const line of matchLines){
        let m;
        vsRegex.lastIndex=0;
        while((m=vsRegex.exec(line))!==null){
          let loc=m[1].replace(/Grupo\s*[A-L]/gi,"").replace(/Fecha\s*\d+/gi,"").trim();
          let vis=m[2].trim();
          const gl=parseInt(m[3]),gv=parseInt(m[4]);
          // Clean artifacts from team names
          loc=loc.replace(/^[\s\d.]+/,"").trim();
          vis=vis.replace(/\[.*?\]/g,"").replace(/\d+p$/,"").trim();
          const realLoc = findTeam(loc);
          const realVis = findTeam(vis);
          if(!realLoc || !realVis){
            console.log("PDF Parser: no match for",JSON.stringify(loc),"vs",JSON.stringify(vis));
            continue;
          }
          const gk=realLoc+"||"+realVis;
          const gi=glookup[gk];
          if(gi!==undefined){res[gi]={gl,gv};foundCount++;}
        }
      }
      // Fallback: also try fullText lines for any missed matches
      for(const line of headerLines){
        let m;
        const rx2=/(.+?)\s+vs\s+(.+?)\s+(\d+)\s*[\-\u2013]\s*(\d+)/gi;
        while((m=rx2.exec(line))!==null){
          let loc=m[1].replace(/Grupo\s*[A-L]/gi,"").replace(/Fecha\s*\d+/gi,"").trim();
          let vis=m[2].trim();
          const gl=parseInt(m[3]),gv=parseInt(m[4]);
          loc=loc.replace(/^[\s\d.]+/,"").trim();
          vis=vis.replace(/\[.*?\]/g,"").replace(/\d+p$/,"").trim();
          const realLoc = findTeam(loc);
          const realVis = findTeam(vis);
          if(!realLoc || !realVis) continue;
          const gk=realLoc+"||"+realVis;
          const gi=glookup[gk];
          if(gi!==undefined && res[gi]===null){res[gi]={gl,gv};foundCount++;}
        }
      }
      console.log("PDF Parser: found "+foundCount+" of 72 matches");
      return{nombre,apellido,campeon,goleador,resultados:res};
    }

        <p>📅 Grupos: ${grupos}/72</p>
        <div class="acciones" style="margin-top:14px">
          <button onclick="confirmarRestauracion('${key}')">✔ Restaurar</button>
          <button class="btn-sec" onclick="this.closest('.modal-overlay').remove()">✕ Cancelar</button>
        </div>
      </div>`;
      document.body.appendChild(overlay);
      overlay._datos=d;
      overlay._key=key;
    }

    async function confirmarRestauracion(key){
      const overlay=document.querySelector(".modal-overlay");
      if(!overlay)return;
      const d=overlay._datos;
      const status=document.getElementById("pdf-status");
      bd.usuarios[key]={
        nombre:d.nombre,apellido:d.apellido,
        fecha:new Date().toLocaleString("es-AR"),
        resultados:d.resultados,
        campeon:d.campeon||"",
        goleador:d.goleador||""
      };
      await guardarBD({["usuarios."+key]: bd.usuarios[key]});
      overlay.remove();
      status.innerHTML=`<div class="msg ok">✔ ${d.nombre} ${d.apellido} restaurado correctamente.</div>`;
      renderApp();
    }

    async function recargar(){
      await initBD();
      renderApp();
    }

    function autoLogin(){
      const saved=sessionStorage.getItem(SESSION_KEY);
      if(saved){
        try{USUARIO=JSON.parse(saved);ADMIN_MODE=false;return true}catch(e){}
      }
      return false;
    }

    async function init(){
      await initBD();
      if(autoLogin()){
        renderApp();
      }else{
        document.getElementById("app").innerHTML=loginHTML();
      }
      firebase.auth().onAuthStateChanged(user=>{
        if(!user&&ADMIN_MODE){
          ADMIN_MODE=false;
          AUTH_USER=null;
          EDITANDO_KEY=null;
          USUARIO=null;
          sessionStorage.removeItem(SESSION_KEY);
          document.getElementById("app").innerHTML=loginHTML();
        }else if(user&&!ADMIN_MODE){
          AUTH_USER=user;
        }
      });
    }

    init();
  </script>
</body>
</html>
