async function initBD(){
  try{
    const snap = await DB_REF.get();
    if(snap.exists){
      bd = snap.data();
    }else{
      bd = {usuarios:{}, reales:[]};
      await DB_REF.set(bd);
    }
  }catch(e){
    bd = {usuarios:{}, reales:[]};
  }
}

async function loginAdmin(){

      await firebase.auth().signOut();

// === LOGICA ===
function normalizeKey(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9_]/g,"");
}

function calcularPts(pred,real){
  if(!pred||!real||real.gl===undefined||real.gv===undefined)return null;
  if(pred.gl===real.gl&&pred.gv===real.gv)return 3;
  const dPred=Math.sign(pred.gl-pred.gv);
  const dReal=Math.sign(real.gl-real.gv);
  if(dPred===dReal)return 1;
  return 0;
}

function calcularTabla(grupo,resultados){
  const pts=PARTIDOS.map((p,i)=>({...p,i})).filter(p=>p.grupo===grupo);
  const eq={};
  for(const p of pts){if(!eq[p.local])eq[p.local]={pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};if(!eq[p.visit])eq[p.visit]={pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0};}
  for(const p of pts){
    const r=resultados[p.i];if(!r)continue;
    const L=eq[p.local],V=eq[p.visit];
    L.pj++;V.pj++;L.gf+=r.gl;L.gc+=r.gv;V.gf+=r.gv;V.gc+=r.gl;
    if(r.gl>r.gv){L.g++;V.p++;L.pts+=3}else if(r.gl<r.gv){V.g++;L.p++;V.pts+=3}else{L.e++;V.e++;L.pts++;V.pts++}
  }
  return Object.entries(eq).map(([nom,e])=>({...e,nom,dg:e.gf-e.gc})).sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

async function guardarPrediccion(){
  const inputs=document.querySelectorAll(".inp-gl");
  const resultados=new Array(72).fill(null);

  for(const inp of inputs){
    const idx=parseInt(inp.dataset.idx);
    if(idx>=72)continue;
    const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
    const gl=inp.value.trim();
    const gvVal=gv.value.trim();
    if(gl===""||gvVal===""||isNaN(gl)||isNaN(gvVal)||parseInt(gl)<0||parseInt(gvVal)<0){
      alert("Completá todos los resultados de la fase de grupos con números (0 o más).");
      return;
    }
  }

  for(const inp of inputs){
    const idx=parseInt(inp.dataset.idx);
    if(idx>=72)continue;
    const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
    resultados[idx]={gl:parseInt(inp.value),gv:parseInt(gv.value)};
  }

  if(!confirm("¿Guardar predicción de grupos? Una vez guardada no se puede modificar."))return;

  const campeon=document.getElementById("inp-campeon").value;
  const goleador=document.getElementById("inp-goleador").value.trim();
  bd.usuarios[USUARIO.key]={
    nombre:USUARIO.nombre,apellido:USUARIO.apellido,
    fecha:new Date().toLocaleString("es-AR"),resultados,campeon,goleador
  };
  await guardarBD({["usuarios."+USUARIO.key]: bd.usuarios[USUARIO.key]});
  renderApp();
  setTimeout(()=>descargarPDF(USUARIO.key),500);
}

      </tr>`;
  let lastGrp=null,gi=0;
  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const r=resultados[i];
    const real=reales?reales[i]:null;
    const pts=calcularPts(r,real);
    if(p.grupo!==lastGrp){lastGrp=p.grupo;gi=0;html+=`<tr><td colspan="${hayReales?7:5}" style="padding:5px 5px 2px;color:#2563eb;font-weight:600;font-size:.8rem">Grupo ${p.grupo}</td></tr>`}

      const numF=Math.floor(gi/2)+1;
      html+=`<tr><td colspan="${hayReales?7:5}" style="padding:4px 5px 1px;color:#9ca3af;font-size:.68rem;font-weight:500;letter-spacing:.5px">··· Fecha ${numF} ···</td></tr>`;
    }
    html+=`<tr>
      <td style="padding:2px 5px;border-bottom:1px solid #f3f4f6;color:#9ca3af">${i+1}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #f3f4f6">${p.local}</td>

      <td style="padding:2px 5px;border-bottom:1px solid #f3f4f6;text-align:center">${pts!==null?`<span class="pts-badge pts-${pts}">${pts}</span>`:'-'}</td>`:''}
    </tr>`;

  if(hayReales){
    const total=resultados.slice(0,PARTIDOS.length).reduce((s,r,i)=>{const p=calcularPts(r,reales[i]);return s+(p||0);},0);
    html+=`<tr><td colspan="${hayReales?6:4}" style="padding:6px 5px;text-align:right;font-weight:600;font-size:.85rem">TOTAL GRUPOS:</td>

function renderRanking(reales,hayReales,esAdmin){
  const allUsers=Object.entries(bd.usuarios).filter(([k])=>k!=="admin_admin");
  let html=`<div class="participantes">
    <h4>👥 Participantes (${allUsers.length})</h4>
    <div class="participantes-grid">${allUsers.map(([k,u])=>{
      const ok=u.resultados&&u.resultados.length>0;
      return `<span class="part${ok?' ok':''}">${ok?'✅':'⏳'} ${esAdmin?`<span style="cursor:pointer;color:#2563eb;text-decoration:underline" onclick="editarUsuario('${k}')">${u.nombre} ${u.apellido}</span>`:`${u.nombre} ${u.apellido}`}${esAdmin?` <span style="cursor:pointer;color:#ef4444;font-size:.7rem;text-decoration:underline;margin-left:4px" onclick="eliminarUsuario('${k}')">Eliminar</span>`:''}${esAdmin&&ok?` <span style="cursor:pointer;color:#059669;font-size:.7rem;text-decoration:underline;margin-left:4px" onclick="descargarPDF('${k}')">PDF</span>`:''}</span>`;
    }).join("")}</div>
  </div>`;

  if(!hayReales){
    return html+`<div class="msg info" style="margin-top:12px">Los resultados reales aún no fueron cargados. Ingresá como 🎯 Admin para cargarlos.</div>`;
  }

  const entries=allUsers;
  const filas=entries.map(([k,usr])=>{
    if(!usr.resultados||usr.resultados.length===0)return null;
    let pts=0,p3=0,p1=0;
    for(let i=0;i<PARTIDOS.length;i++){
      const p=calcularPts(usr.resultados[i],reales[i]);
      if(p===3)p3++;else if(p===1)p1++;
      if(p)pts+=p;
    }
    let bonus=0;
    if(bd.campeon_real&&usr.campeon===bd.campeon_real)bonus+=10;
    if(bd.goleador_real&&usr.goleador&&usr.goleador.toLowerCase()===bd.goleador_real.toLowerCase())bonus+=5;
    pts+=bonus;
    return {key:k,nombre:usr.nombre,apellido:usr.apellido,pts,p3,p1,bonus,total:usr.resultados.length};
  }).filter(f=>f!==null);

  filas.sort((a,b)=>b.pts-a.pts || b.p3-a.p3 || b.p1-a.p1);

  if(filas.length===0) return html+`<div class="msg warn">Nadie cargó su predicción todavía.</div>`;

  const hayBonus=bd.campeon_real||bd.goleador_real;
  html+=`<div class="ranking"><table>
    <tr><th>#</th><th>Nombre</th><th style="text-align:center">Pts</th><th style="text-align:center">3</th><th style="text-align:center">1</th><th style="text-align:center">0</th><th style="text-align:center">Efectividad</th>${hayBonus?'<th style="text-align:center">Bonus</th>':''}${esAdmin?'<th style="text-align:center">Acción</th>':''}</tr>`;
  for(let i=0;i<filas.length;i++){
    const f=filas[i];
    const p0=f.total-f.p3-f.p1;
    const maxPts=f.total*3;
    const efect=maxPts>0?((f.pts/maxPts)*100).toFixed(1):"0.0";
    html+=`<tr>
      <td class="pos ${i<3?`pos-${i+1}`:''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td class="nombre">${esAdmin?`<span style="cursor:pointer;color:#2563eb;text-decoration:underline" onclick="editarUsuario('${f.key}')">${f.nombre} ${f.apellido}</span>`:`${f.nombre} ${f.apellido}`}</td>
      <td class="pts-total">${f.pts}</td>
      <td style="text-align:center;color:#059669;font-weight:600">${f.p3}</td>
      <td style="text-align:center;color:#d29922;font-weight:600">${f.p1}</td>
      <td style="text-align:center;color:#9ca3af">${p0}</td>
      <td style="text-align:center;color:#6b7280">${efect}%</td>
      ${hayBonus?`<td style="text-align:center;color:#d29922;font-weight:600;font-size:.8rem">${f.bonus>0?'+'+f.bonus:'-'}</td>`:''}
      ${esAdmin?`<td style="text-align:center"><span style="cursor:pointer;color:#d29922;font-size:.75rem;text-decoration:underline;margin-right:6px" onclick="editarUsuario('${f.key}')">Editar</span><span style="cursor:pointer;color:#2563eb;font-size:.75rem;text-decoration:underline" onclick="descargarPDF('${f.key}')">📄 PDF</span></td>`:''}
    </tr>`;
  }
  html+=`</table></div>`;
  html+=`<div class="acciones" style="margin-top:6px"><button class="btn-sec" onclick="compartirRanking()">📸 Compartir ranking</button></div>`;
  return html;
}

function descargarPDF(key){
  const usr=bd.usuarios[key];
  if(!usr||!usr.resultados){alert("No hay datos para generar PDF");return;}

  if(window.jspdf){
    generarPDF(key);
  }else{
    const urls=[
      "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js",
      "https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js",
      "https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"
    ];
    cargarJsPDF(urls,0,key);
  }
}

function cargarJsPDF(urls,idx,key){
  if(idx>=urls.length){imprimirPrediccion(key);return;}
  const s=document.createElement("script");
  s.src=urls[idx];
  s.onload=()=>{setTimeout(()=>{window.jspdf?generarPDF(key):cargarJsPDF(urls,idx+1,key)},300)};
  s.onerror=()=>cargarJsPDF(urls,idx+1,key);
  document.head.appendChild(s);
}

function generarPDF(key){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    const usr=bd.usuarios[key];
    const reales=bd.reales||[];
    const M=14,rowH=4.5;
    let y=28;

    function ts(s,size,color,bold){
      size&&doc.setFontSize(size);
      color&&doc.setTextColor(...color);
      bold?doc.setFont(undefined,'bold'):doc.setFont(undefined,'normal');
    }

    ts("Prode Mundial 2026",18,[0,0,0],1);doc.text("Prode Mundial 2026",M,y);y+=9;
    ts(`${usr.nombre} ${usr.apellido} — ${usr.fecha||'-'}`,10,[60,60,60],0);doc.text(`${usr.nombre} ${usr.apellido} — ${usr.fecha||'-'}`,M,y);y+=7;

    if(usr.campeon||usr.goleador){
      ts(`Campeon: ${usr.campeon||'—'}  Goleador: ${usr.goleador||'—'}`,9,[0,0,0],0);doc.text(`Campeon: ${usr.campeon||'—'}   Goleador: ${usr.goleador||'—'}`,M,y);y+=6;
    }

    for(const g of GRUPOS){
      if(y>270){doc.addPage();y=28}
      ts(`Grupo ${g}`,9,[40,100,200],1);doc.text(`Grupo ${g}`,M,y);y+=5.5;

      const matches=PARTIDOS.map((p,i)=>({...p,i})).filter(p=>p.grupo===g);
      for(let mi=0;mi<matches.length;mi++){
        if(y>278){doc.addPage();y=28}
        if(mi%2===0){
          const nf=Math.floor(mi/2)+1;
          ts(`Fecha ${nf}`,7,[150,150,150],0);doc.text(`Fecha ${nf}`,M,y);y+=4;
        }
        const m=matches[mi];
        const r=usr.resultados[m.i];
        const score=r?`${r.gl} - ${r.gv}`:"? - ?";
        const real=reales[m.i];
        const full=`${m.local}  vs  ${m.visit}  ${score}`;
        doc.text(full,M,y);
        if(real){doc.text(`[${real.gl}-${real.gv}]`,105,y);}
        const pts=calcularPts(r,real);
        if(pts!==null)doc.text(`${pts}p`,210-M-rowH,y);
        y+=rowH;
      }
      y+=1.5;
    }

    const hoy=new Date().toLocaleDateString("es-AR").replace(/\//g,"-");
    const blob=doc.output("blob");
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`prode-${usr.nombre.toLowerCase()}-${hoy}.pdf`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},1000);
  }catch(e){
    console.error(e);
    imprimirPrediccion(key);
  }
}

function imprimirPrediccion(key){
  const usr=bd.usuarios[key];
  if(!usr||!usr.resultados)return;
  const reales=bd.reales||[];
  const w=window.open("","_blank");
  let h=`<html><head><meta charset="utf-8"><title>Prode ${usr.nombre}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:12px;padding:20px;color:#111}
    h1{font-size:18px;margin:0 0 4px}
    .sub{color:#666;font-size:11px;margin-bottom:12px}
    .g{page-break-inside:avoid;margin-bottom:8px}
    .g h2{font-size:13px;color:#2563eb;margin:6px 0 2px;border-bottom:1px solid #ddd;padding-bottom:2px}
    .f{font-size:10px;color:#999;margin:4px 0 1px;font-weight:500}
    .m{display:flex;justify-content:space-between;padding:1px 0;font-size:11px}
    .m .pred{font-weight:700;min-width:40px;text-align:center}
    .m .pts{color:#059669;font-weight:600;min-width:24px;text-align:right}
    .extra{font-size:11px;margin-bottom:10px;color:#333}
  </style></head><body>
  <h1>Prode Mundial 2026</h1>
  <div class="sub">${usr.nombre} ${usr.apellido} — ${usr.fecha||'-'}</div>`;
  if(usr.campeon||usr.goleador)
    h+=`<div class="extra">Campeon: ${usr.campeon||'—'} &nbsp; Goleador: ${usr.goleador||'—'}</div>`;
  for(const g of GRUPOS){
    h+=`<div class="g"><h2>Grupo ${g}</h2>`;
    const matches=PARTIDOS.map((p,i)=>({...p,i})).filter(p=>p.grupo===g);
    for(let mi=0;mi<matches.length;mi++){
      if(mi%2===0){const nf=Math.floor(mi/2)+1;h+=`<div class="f">Fecha ${nf}</div>`}
      const m=matches[mi];
      const r=usr.resultados[m.i];
      const score=r?`${r.gl}-${r.gv}`:"?-?";
      const real=reales[m.i];
      const pts=calcularPts(r,real);
      h+=`<div class="m"><span>${m.local} vs ${m.visit}</span><span class="pred">${score}</span>${real?`<span style="color:#d29922;font-size:10px">[${real.gl}-${real.gv}]</span>`:''}<span class="pts">${pts!==null?pts+'p':''}</span></div>`;
    }
    h+=`</div>`;
  }
  h+=`<script>window.onload=function(){window.print();window.close()}<`+`/script></body></html>`;
  w.document.write(h);
  w.document.close();
}

function compartirRanking(){
  const entries=Object.entries(bd.usuarios).filter(([k])=>k!=="admin_admin");
  const reales=bd.reales||[];
  const hayBonus=bd.campeon_real||bd.goleador_real;
  const filas=entries.map(([k,usr])=>{
    if(!usr.resultados||usr.resultados.length===0)return null;
    let pts=0,p3=0,p1=0;
    for(let i=0;i<PARTIDOS.length;i++){
      const p=calcularPts(usr.resultados[i],reales[i]);
      if(p===3)p3++;else if(p===1)p1++;
      if(p)pts+=p;
    }
    let bonus=0;
    if(bd.campeon_real&&usr.campeon===bd.campeon_real)bonus+=10;
    if(bd.goleador_real&&usr.goleador&&usr.goleador.toLowerCase()===bd.goleador_real.toLowerCase())bonus+=5;
    pts+=bonus;
    const maxP=PARTIDOS.length*3;
    const efect=maxP>0?((pts/maxP)*100).toFixed(1):"0.0";
    return {nombre:usr.nombre+" "+usr.apellido,pts,p3,p1,p0:usr.resultados.length-p3-p1,efect};
  }).filter(f=>f!==null);
  filas.sort((a,b)=>b.pts-a.pts || b.p3-a.p3);

  const c=document.createElement("canvas");
  c.width=520;c.height=90+filas.length*32;
  const ctx=c.getContext("2d");
  const W=c.width;

  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,c.height);
  ctx.fillStyle="#1a1a2e";ctx.font="bold 18px -apple-system,sans-serif";ctx.textAlign="center";
  ctx.fillText("🏆 Prode Mundial 2026 — Ranking",260,30);
  ctx.fillStyle="#9ca3af";ctx.font="11px -apple-system,sans-serif";
  ctx.fillText(new Date().toLocaleDateString("es-AR"),260,46);

  const cols=[{x:16,w:30,align:"center"},{x:48,w:120,align:"left"},{x:180,w:50,align:"center"},{x:240,w:35,align:"center"},{x:285,w:35,align:"center"},{x:325,w:35,align:"center"},{x:370,w:65,align:"center"}];
  if(hayBonus)cols.push({x:440,w:40,align:"center"});
  const headers=["#","Nombre","Pts","3p","1p","0p","Efec."];
  if(hayBonus)headers.push("Bonus");

  ctx.fillStyle="#f3f4f6";ctx.fillRect(10,56,W-20,22);
  ctx.fillStyle="#6b7280";ctx.font="bold 10px -apple-system,sans-serif";
  headers.forEach((h,i)=>{ctx.textAlign=cols[i].align;const cx=cols[i].align==="center"?cols[i].x+cols[i].w/2:cols[i].x;ctx.fillText(h,cx,71)});

  const rowH=28;
  for(let i=0;i<filas.length;i++){
    const f=filas[i];
    const y=88+i*rowH;
    if(i%2===1){ctx.fillStyle="#f9fafb";ctx.fillRect(10,y-6,W-20,rowH);ctx.fillStyle="#374151"}else{ctx.fillStyle="#374151"}
    const vals=[i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1,f.nombre,f.pts,f.p3,f.p1,f.p0,f.efect+"%"];
    if(hayBonus)vals.push(f.bonus>0?"+"+f.bonus:"-");
    ctx.font="12px -apple-system,sans-serif";
    vals.forEach((v,j)=>{
      ctx.textAlign=cols[j].align;
      const cx=cols[j].align==="center"?cols[j].x+cols[j].w/2:cols[j].x;
      if(j===2)ctx.fillStyle="#2563eb";else ctx.fillStyle="#374151";
      ctx.fillText(v+"",cx,y+8);
    });
  }

  const link=document.createElement("a");
  link.download=`ranking-prode-${new Date().toISOString().slice(0,10)}.png`;
  link.href=c.toDataURL("image/png");
  link.click();
}

let pdfjsLoaded = false;

async function subirPDF(file){
  const status=document.getElementById("pdf-status");
  if(!file){status.innerHTML="";return}
  if(file.type!=="application/pdf"){status.innerHTML=`<div class="msg warn">El archivo debe ser PDF.</div>`;return}
  if(!pdfjsLoaded){
    status.innerHTML=`<div class="spinner"></div> Cargando lector PDF...`;
    try{
      await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s)});
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      pdfjsLoaded=true;
    }catch(e){status.innerHTML=`<div class="msg warn">Error al cargar el lector PDF.</div>`;return}
  }
  status.innerHTML=`<div class="spinner"></div> Leyendo PDF...`;
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text="";
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const c=await pg.getTextContent();
      text+=c.items.map(it=>it.str).join(" ")+"\n";
    }
    const datos=parsearPDFText(text);
    if(!datos){status.innerHTML=`<div class="msg warn">No se pudieron extraer las predicciones. ¿Es un PDF generado desde el Prode?</div>`;return}
    mostrarConfirmacionRestauracion(datos);
    status.innerHTML="";
  }catch(e){status.innerHTML=`<div class="msg warn">Error al leer el PDF: ${e.message}</div>`}
}

function parsearPDFText(text){
  const lines=text.split("\n").map(l=>l.replace(/\s+/g," ").trim()).filter(l=>l);
  let nombre="",apellido="",campeon="",goleador="";
  for(const line of lines){
    let m=line.match(/^(.+?)\s*[—–-]\s+\d/);
    if(m&&!nombre){
      const p=m[1].trim().split(/\s+/);
      if(p.length>=2){nombre=p[0];apellido=p.slice(1).join(" ");continue}
    }
    m=line.match(/Campeon:\s*(.+?)\s+Goleador:\s*(.+)/i);
    if(m){campeon=m[1].trim();goleador=m[2].trim();continue}
  }
  if(!nombre)return null;
  const res=new Array(72).fill(null);
  const glookup={};
  PARTIDOS.forEach((p,i)=>{glookup[p.local+"||"+p.visit]=i});
  const allTeams=[...new Set(PARTIDOS.flatMap(p=>[p.local,p.visit]))];
  for(const line of lines){
    const m=line.match(/(.+?)\s+vs\s+(.+?)\s+(\d+)\s*[-–]\s*(\d+)/i);
    if(!m)continue;
    const loc=m[1].trim(),vis=m[2].trim(),gl=parseInt(m[3]),gv=parseInt(m[4]);
    if(!allTeams.includes(loc)||!allTeams.includes(vis))continue;
    const gk=loc+"||"+vis;
    const gi=glookup[gk];
    if(gi!==undefined)res[gi]={gl,gv};
  }
  return{nombre,apellido,campeon,goleador,resultados:res};
}

function mostrarConfirmacionRestauracion(d){
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  const key=normalizeKey(d.nombre+"_"+d.apellido);
  const existe=bd.usuarios[key]?"(sobrescribe)":"(nuevo)";
  const grupos=d.resultados.filter((r,i)=>i<72&&r!==null).length;
  overlay.innerHTML=`
  <div id="modal-contenido" style="max-width:480px">
    <button class="cerrar-modal" onclick="this.closest('.modal-overlay').remove()">✕</button>
    <h3>📥 Restaurar usuario</h3>
    <p><strong>${d.nombre} ${d.apellido}</strong> ${existe}</p>
    <p>🏆 Campeón: ${d.campeon||"—"} &nbsp; ⚽ Goleador: ${d.goleador||"—"}</p>
    <p>📋 Grupos: ${grupos}/72</p>
    <div class="acciones" style="margin-top:14px">
      <button onclick="confirmarRestauracion('${key}')">✅ Restaurar</button>
      <button class="btn-sec" onclick="this.closest('.modal-overlay').remove()">✕ Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay._datos=d;
  overlay._key=key;
}

async function confirmarRestauracion(key){
  const overlay=document.querySelector(".modal-overlay");
  if(!overlay)return;
  const d=overlay._datos;
  const status=document.getElementById("pdf-status");
  bd.usuarios[key]={
    nombre:d.nombre,apellido:d.apellido,
    fecha:new Date().toLocaleString("es-AR"),
    resultados:d.resultados,
    campeon:d.campeon||"",
    goleador:d.goleador||""
  };
  await guardarBD({["usuarios."+key]: bd.usuarios[key]});
  overlay.remove();
  status.innerHTML=`<div class="msg ok">✅ ${d.nombre} ${d.apellido} restaurado correctamente.</div>`;
  renderApp();
}

async function recargar(){
  await initBD();
  renderApp();
}

function autoLogin(){
  const saved=sessionStorage.getItem(SESSION_KEY);
  if(saved){
    try{USUARIO=JSON.parse(saved);ADMIN_MODE=false;return true}catch(e){}
  }
  return false;
}

async function init(){
  await initBD();
  if(autoLogin()){
    renderApp();
  }else{
    document.getElementById("app").innerHTML=loginHTML();
  }
  firebase.auth().onAuthStateChanged(user=>{
    if(!user&&ADMIN_MODE){
      ADMIN_MODE=false;
      AUTH_USER=null;
      EDITANDO_KEY=null;
      USUARIO=null;
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById("app").innerHTML=loginHTML();
    }else if(user&&!ADMIN_MODE){
      AUTH_USER=user;
    }
  });
}

init();
