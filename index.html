.spinner{display:inline-block;width:14px;height:14px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

</style>

];

const GRUPOS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
const SESSION_KEY = "prode2026_sesion";

// === ESTADO GLOBAL ===
let bd = null;
let USUARIO = null;
let ADMIN_MODE = false;

// === FIREBASE OPERATIONS ===
async function initBD(){
  try{
    const snap = await DB_REF.get();
    if(snap.exists){
      bd = snap.data();
    }else{
      bd = {usuarios:{}, reales:[]};
      await DB_REF.set(bd);
    }
  }catch(e){
    bd = {usuarios:{}, reales:[]};
  }
}

async function guardarBD(){
  if(!bd) return;
  try{
    await DB_REF.set(bd);
  }catch(e){
    alert("Error al guardar: "+e.message);
  }
}

// === LOGIN ===
function loginHTML(){
  return `
  <div id="login">
    <div class="login-card">
      <div class="trofeo-wrap">
        <span class="trofeo">🏆</span>
        <div class="shine"></div>
      </div>
      <h1>Prode <span>Mundial</span> 2026</h1>
      <p class="sub">Pronosticá todos los partidos</p>
      <div class="year-line"><strong>11 JUN — 19 JUL</strong></div>
      <div class="grupos-vis">${"ABCDEFGHIJKL".split("").map(l=>`<span>${l}</span>`).join("")}</div>
      <div class="input-group"><span class="ic">👤</span><input type="text" id="nombre" placeholder="Nombre" autocomplete="off"></div>
      <div class="input-group"><span class="ic">✏️</span><input type="text" id="apellido" placeholder="Apellido" autocomplete="off"></div>
      <button onclick="doLogin()">ENTRAR AL PRODE</button>
      <div class="error" id="loginError"></div>
      <span class="admin-link" onclick="mostrarAdminLogin()">🔑 Ingreso admin</span>
      <div class="footer"><span>📅 12 grupos</span><span>⚽ 72 partidos</span></div>
    </div>
  </div>`;
}

function mostrarAdminLogin(){
  const pass=prompt("Contraseña de administrador:");
  if(pass===null)return;
  if(pass==="admin123"){
    ADMIN_MODE=true;
    USUARIO={nombre:"Admin",apellido:"Admin",key:"admin_admin"};
    sessionStorage.setItem(SESSION_KEY,JSON.stringify(USUARIO));
    if(bd&&!bd.usuarios["admin_admin"]){
      bd.usuarios["admin_admin"]={nombre:"Admin",apellido:"Admin",fecha:"-",resultados:[]};
      guardarBD();
    }
    renderApp();
  }else{
    alert("Contraseña incorrecta.");
  }
}

function doLogin(){
  const nom=document.getElementById("nombre").value.trim();
  const ape=document.getElementById("apellido").value.trim();
  const err=document.getElementById("loginError");
  if(!nom||!ape){err.textContent="Completá nombre y apellido";return}
  err.textContent="";
  USUARIO={nombre:nom,apellido:ape,key:nom.toLowerCase()+"_"+ape.toLowerCase()};
  ADMIN_MODE=false;
  sessionStorage.setItem(SESSION_KEY,JSON.stringify(USUARIO));
  renderApp();
}

function cerrarSesion(){
  USUARIO=null;
  ADMIN_MODE=false;
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById("app").innerHTML=loginHTML();
}

function toggleAdmin(){
  if(ADMIN_MODE){
    ADMIN_MODE=false;
    renderApp();
    return;
  }
  const pass=prompt("Contraseña de administrador:");
  if(pass===null)return;
  if(pass==="admin123"){
    ADMIN_MODE=true;
    renderApp();
  }else{
    alert("Contraseña incorrecta.");
  }
}

// === LOGICA ===
function calcularPts(pred,real){
  if(!pred||!real||real.gl===undefined||real.gv===undefined)return null;
  if(pred.gl===real.gl&&pred.gv===real.gv)return 3;
  const dPred=Math.sign(pred.gl-pred.gv);
  const dReal=Math.sign(real.gl-real.gv);
  if(dPred===dReal)return 1;
  return 0;
}

function renderApp(){
  if(!bd)return;

  const data=bd.usuarios[USUARIO.key];
  const bloqueado=!!data&&!!data.resultados&&data.resultados.length>0;
  const reales=bd.reales||[];
  const hayReales=reales.some(r=>r!==undefined&&r!==null);
  const tab=sessionStorage.getItem("prode_tab")||"prode";

  let html=`
  <header>
    <div class="hl">
      <h2>🏆 Prode Mundial 2026</h2>
      <button class="btn-admin${ADMIN_MODE?' admin-activo':''}" onclick="toggleAdmin()">🎯 ${ADMIN_MODE?'Admin ON':'Admin'}</button>
      <button onclick="recargar()" title="Recargar datos">🔄</button>
    </div>
    <div class="hr">
      <span>${USUARIO.nombre} ${USUARIO.apellido}</span>
      <button onclick="cerrarSesion()">Salir</button>
    </div>
  </header>`;

  const tabs=[{id:"prode",label:"📋 Prode"},{id:"ranking",label:"🏆 Ranking"}];
  html+=`<div class="tabs">`;
  for(const t of tabs) html+=`<div class="tab${tab===t.id?' activo':''}" onclick="cambiarTab('${t.id}')">${t.label}</div>`;
  html+=`</div>`;

  html+=`<div class="tab-content${tab==='prode'?' activo':''}" id="tab-prode">`;

  if(bloqueado&&!ADMIN_MODE){
    html+=`<div class="msg info">Predicción guardada el ${data.fecha}. No se puede modificar.</div>`;
  }
  if(!bloqueado&&!ADMIN_MODE){
    html+=`<div class="msg warn">Completá todos los resultados y guardá al final.</div>`;
  }

  for(const g of GRUPOS){
    const pts=PARTIDOS.map((p,i)=>({...p,idx:i})).filter(p=>p.grupo===g);
    const isOpen=sessionStorage.getItem("grupo_"+g)!=="closed";
    html+=`<div class="grupo">
      <div class="grupo-header" onclick="toggleGrupo('${g}')">
        Grupo ${g} <span class="arrow${isOpen?' abierto':''}">▼</span>
      </div>
      <div class="grupo-body" style="display:${isOpen?'block':'none'}">`;
    for(const p of pts){
      const val=bloqueado&&!ADMIN_MODE?(data.resultados[p.idx]||{gl:"",gv:""}):{gl:"",gv:""};
      const r=reales[p.idx]||{};
      const predUsr=data?data.resultados[p.idx]:null;
      const ptsG=calcularPts(predUsr,r);
      const editable=!bloqueado||ADMIN_MODE;
      html+=`<div class="partido">
        <div class="eq local">${p.local}</div>
        <div class="score-input">
          ${!editable
            ?`<span class="score-display">${val.gl!==''?val.gl:'?'}-${val.gv!==''?val.gv:'?'}</span>`
            :`<input type="number" min="0" max="99" class="inp-gl" data-idx="${p.idx}" placeholder="0" value="${ADMIN_MODE&&r.gl!==undefined&&r.gl!==''?r.gl:''}">
              <span class="sep">-</span>
              <input type="number" min="0" max="99" class="inp-gv" data-idx="${p.idx}" placeholder="0" value="${ADMIN_MODE&&r.gv!==undefined&&r.gv!==''?r.gv:''}">`
          }
          ${ptsG!==null?`<span class="pts-badge pts-${ptsG}">${ptsG}p</span>`:''}
        </div>
        <div class="eq visit">${p.visit}</div>
      </div>`;
    }
    html+=`</div></div>`;
  }

  if(ADMIN_MODE){
    html+=`<div class="acciones"><button onclick="guardarResultadosAdmin()">💾 Guardar Resultados</button></div>`;
  }else if(!bloqueado){
    html+=`<div class="acciones"><button onclick="guardarPrediccion()">🔒 Guardar Prediccion</button></div>`;
  }

  if(bloqueado&&!ADMIN_MODE) html+=generarResumen(data.resultados,reales,hayReales);

  html+=`</div>`;

  html+=`<div class="tab-content${tab==='ranking'?' activo':''}" id="tab-ranking">`;
  html+=renderRanking(reales,hayReales);
  html+=`</div>`;

  document.getElementById("app").innerHTML=html;
}

function toggleGrupo(g){
  const key="grupo_"+g;
  sessionStorage.setItem(key,sessionStorage.getItem(key)==="closed"?"open":"closed");
  renderApp();
}

function cambiarTab(t){
  sessionStorage.setItem("prode_tab",t);
  renderApp();
}

async function guardarPrediccion(){
  const inputs=document.querySelectorAll(".inp-gl");
  const resultados=[];

  for(const inp of inputs){
    const idx=parseInt(inp.dataset.idx);
    const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
    const gl=inp.value.trim();
    const gvVal=gv.value.trim();
    if(gl===""||gvVal===""||isNaN(gl)||isNaN(gvVal)||parseInt(gl)<0||parseInt(gvVal)<0){
      alert("Completá todos los resultados con números (0 o más).");
      return;
    }
  }

  for(const inp of inputs){
    const idx=parseInt(inp.dataset.idx);
    const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
    resultados[idx]={gl:parseInt(inp.value),gv:parseInt(gv.value)};
  }

  if(!confirm("¿Guardar predicción? Una vez guardada no se puede modificar."))return;

  bd.usuarios[USUARIO.key]={
    nombre:USUARIO.nombre,apellido:USUARIO.apellido,
    fecha:new Date().toLocaleString("es-AR"),resultados
  };
  await guardarBD();
  renderApp();
}

async function guardarResultadosAdmin(){
  const inputs=document.querySelectorAll(".inp-gl");
  const reales=[];

  for(const inp of inputs){
    const idx=parseInt(inp.dataset.idx);
    const gv=document.querySelector(`.inp-gv[data-idx="${idx}"]`);
    const gl=inp.value.trim();
    const gvVal=gv.value.trim();
    if(gl===""&&gvVal===""){
      reales[idx]=null;
    }else if(gl===""||gvVal===""||isNaN(gl)||isNaN(gvVal)||parseInt(gl)<0||parseInt(gvVal)<0){
      alert(`Resultado #${idx+1} inválido.`);
      return;
    }else{
      reales[idx]={gl:parseInt(gl),gv:parseInt(gvVal)};
    }
  }

  bd.reales=reales;
  await guardarBD();
  renderApp();
}

function generarResumen(resultados,reales,hayReales){
  if(!resultados)return "";
  let html=`<div style="margin-top:14px">
    <h3 style="margin:12px 0 6px;font-size:.9rem;color:#8b949e">📋 Resumen</h3>
    <table style="width:100%;border-collapse:collapse;font-size:.78rem">
      <tr>
        <th style="text-align:left;padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e">#</th>
        <th style="text-align:left;padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e">Local</th>
        <th style="padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e"></th>
        <th style="text-align:left;padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e">Visitante</th>
        <th style="padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e;text-align:center">Pred</th>
        ${hayReales?'<th style="padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e;text-align:center">Real</th><th style="padding:3px 5px;border-bottom:1px solid #21262d;color:#8b949e;text-align:center">Pts</th>':''}
      </tr>`;
  for(let i=0;i<PARTIDOS.length;i++){
    const p=PARTIDOS[i];
    const r=resultados[i];
    const real=reales?reales[i]:null;
    const pts=calcularPts(r,real);
    if(i===0||PARTIDOS[i-1].grupo!==p.grupo) html+=`<tr><td colspan="${hayReales?7:5}" style="padding:6px 5px 2px;color:#58a6ff;font-weight:600;font-size:.8rem">Grupo ${p.grupo}</td></tr>`;
    html+=`<tr>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;color:#484f58">${i+1}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22">${p.local}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;color:#484f58">vs</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22">${p.visit}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center;font-weight:600">${r?r.gl:'?'}-${r?r.gv:'?'}</td>
      ${hayReales?`<td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center;color:#d29922;font-weight:600">${real!==null&&real!==undefined?real.gl+' - '+real.gv:'-'}</td>
      <td style="padding:2px 5px;border-bottom:1px solid #161b22;text-align:center">${pts!==null?`<span class="pts-badge pts-${pts}">${pts}</span>`:'-'}</td>`:''}
    </tr>`;
  }
  if(hayReales){
    const total=resultados.reduce((s,r,i)=>{const p=calcularPts(r,reales[i]);return s+(p||0);},0);
    html+=`<tr><td colspan="${hayReales?6:4}" style="padding:6px 5px;text-align:right;font-weight:600;font-size:.85rem">TOTAL:</td>
      <td style="padding:6px 5px;text-align:center;color:#58a6ff;font-weight:700;font-size:1rem">${total} pts</td></tr>`;
  }
  html+=`</table></div>`;
  return html;
}

function renderRanking(reales,hayReales){
  if(!hayReales){
    return `<div class="msg info">Los resultados reales aún no fueron cargados. Ingresá como 🎯 Admin para cargarlos.</div>`;
  }

  const filas=Object.entries(bd.usuarios)
    .filter(([k])=>k!=="admin_admin")
    .map(([,usr])=>{
      if(!usr.resultados||usr.resultados.length===0)return null;
      let pts=0,p3=0,p1=0;
      usr.resultados.forEach((r,i)=>{
        const p=calcularPts(r,reales[i]);
        if(p===3)p3++;else if(p===1)p1++;
        if(p)pts+=p;
      });
      return {nombre:usr.nombre,apellido:usr.apellido,pts,p3,p1,total:usr.resultados.length};
    })
    .filter(f=>f!==null);

  filas.sort((a,b)=>b.pts-a.pts);

  if(filas.length===0) return `<div class="msg warn">Todavía no hay participantes.</div>`;

  let html=`<div class="ranking"><table>
    <tr><th>#</th><th>Nombre</th><th style="text-align:center">Pts</th><th style="text-align:center">3</th><th style="text-align:center">1</th><th style="text-align:center">0</th><th style="text-align:center">Efectividad</th></tr>`;
  for(let i=0;i<filas.length;i++){
    const f=filas[i];
    const p0=f.total-f.p3-f.p1;
    const maxPts=f.total*3;
    const efect=maxPts>0?((f.pts/maxPts)*100).toFixed(1):"0.0";
    html+=`<tr>
      <td class="pos ${i<3?`pos-${i+1}`:''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td class="nombre">${f.nombre} ${f.apellido}</td>
      <td class="pts-total">${f.pts}</td>
      <td style="text-align:center;color:#3fb950;font-weight:600">${f.p3}</td>
      <td style="text-align:center;color:#d29922;font-weight:600">${f.p1}</td>
      <td style="text-align:center;color:#484f58">${p0}</td>
      <td style="text-align:center;color:#8b949e">${efect}%</td>
    </tr>`;
  }
  html+=`</table></div>`;
  return html;
}

async function recargar(){
  await initBD();
  renderApp();
}

function autoLogin(){
  const saved=sessionStorage.getItem(SESSION_KEY);
  if(saved){
    try{USUARIO=JSON.parse(saved);ADMIN_MODE=false;return true}catch(e){}
  }
  return false;
}

async function init(){
  await initBD();
  if(autoLogin()){
    renderApp();
  }else{
    document.getElementById("app").innerHTML=loginHTML();
  }
}

init();
</script>
